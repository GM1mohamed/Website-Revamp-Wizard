<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMube Edu - مشاهدة الدرس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
.meta-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
.meta-bar .tag { font-size:12px; }
.action-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.like-btn.liked { background:rgba(34,214,94,0.15); color:var(--primary); border-color:rgba(34,214,94,0.4); }
.save-btn.saved { background:rgba(129,140,248,0.15); color:var(--accent); border-color:rgba(129,140,248,0.4); }
.video-info-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
.video-info-card h1 { font-size:17px; font-weight:800; line-height:1.4; margin-bottom:10px; }
.teacher-row { display:flex; align-items:center; gap:10px; padding:12px; background:var(--surface2); border-radius:var(--radius-sm); cursor:pointer; transition:var(--transition); text-decoration:none; color:var(--text); }
.teacher-row:hover { background:var(--surface3); }
.teacher-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary)); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.teacher-avatar img { width:100%; height:100%; object-fit:cover; }
.teacher-avatar i { font-size:22px; color:#fff; }
.rating-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.star-input i { font-size:22px; color:var(--text-muted); cursor:pointer; transition:var(--transition); }
.star-input i:hover, .star-input i.hovered, .star-input i.filled { color:var(--warning); transform:scale(1.1); }
.related-item { display:flex; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px; cursor:pointer; transition:var(--transition); margin-bottom:6px; }
.related-item:hover { border-color:var(--border-hover); transform:translateX(-2px); }
.related-thumb { width:100px; height:56px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; }
.related-thumb img { width:100%; height:100%; object-fit:cover; }
.related-info .title { font-size:12px; font-weight:700; line-height:1.4; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.related-info .meta { font-size:11px; color:var(--text-muted); }
</style>
</head>
<body>

<div class="top-bar">
    <a href="/index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        <span>GMube Edu</span>
    </a>
    <div style="display:flex;gap:6px;margin-right:auto;">
        <button onclick="history.back()" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-right"></i> رجوع</button>
    </div>
</div>

<div class="page-container" style="max-width:800px;">

    <div id="loadingState" class="loading-state"><div class="spinner"></div><span>جاري تحميل الدرس...</span></div>

    <div id="mainContent" style="display:none;">
        <!-- Player -->
        <div class="player-container" id="playerContainer"></div>

        <!-- Video Info -->
        <div class="video-info-card">
            <h1 id="videoTitle"></h1>
            <div class="meta-bar" id="metaBar"></div>
            <div class="action-bar" id="actionBar"></div>
            <a href="#" id="teacherRow" class="teacher-row">
                <div class="teacher-avatar" id="teacherAvatar"><i class="fas fa-user-circle"></i></div>
                <div>
                    <div id="teacherName" style="font-size:14px;font-weight:700;"></div>
                    <div id="teacherSubject" style="font-size:12px;color:var(--text-muted);"></div>
                </div>
                <i class="fas fa-chevron-left" style="margin-right:auto;color:var(--text-muted);font-size:12px;"></i>
            </a>
        </div>

        <!-- Comments -->
        <div class="card" style="margin-bottom:16px;">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                <i class="fas fa-comments" style="color:var(--primary);"></i>
                التعليقات والتقييم
                <span id="commentCount" style="font-size:13px;color:var(--text-muted);font-weight:400;"></span>
            </h3>

            <div id="ratingSection" style="display:none;margin-bottom:14px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);">
                <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-secondary);">
                    <i class="fas fa-star" style="color:var(--warning);"></i> تقييمك للدرس
                </div>
                <div class="rating-row">
                    <div class="star-input" id="starInput">
                        <i class="fas fa-star" data-val="1"></i>
                        <i class="fas fa-star" data-val="2"></i>
                        <i class="fas fa-star" data-val="3"></i>
                        <i class="fas fa-star" data-val="4"></i>
                        <i class="fas fa-star" data-val="5"></i>
                    </div>
                    <span id="ratingLabel" style="font-size:12px;color:var(--text-muted);"></span>
                </div>
                <textarea id="commentInput" placeholder="أضف تعليقك..." style="width:100%;margin-top:10px;"></textarea>
                <button class="btn btn-sm" style="margin-top:8px;" onclick="submitComment()">
                    <i class="fas fa-paper-plane"></i> إرسال
                </button>
            </div>

            <div id="commentsContainer"></div>
        </div>

        <!-- Related Videos -->
        <div id="relatedSection" style="display:none;">
            <h3 class="section-title" style="margin-bottom:12px;"><i class="fas fa-list"></i> دروس مشابهة</h3>
            <div id="relatedVideos"></div>
        </div>
    </div>

    <div id="errorState" class="empty-state" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i><p>الدرس غير موجود</p>
        <a href="/index.html" class="btn btn-sm" style="margin-top:12px;">العودة للرئيسية</a>
    </div>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/error-handler.js"></script>
<script>
var video = null;
var session = getSession();
var selectedRating = 0;
var isLiked = false;
var isSaved = false;
var videoId = null;

document.addEventListener('DOMContentLoaded', function() {
    videoId = new URLSearchParams(window.location.search).get('id');
    if (!videoId) { showError(); return; }
    loadVideo(videoId);
});

function loadVideo(id) {
    getVideoById(id).then(function(v) {
        if (!v) { showError(); return; }
        video = v;
        document.title = 'GMube Edu - ' + (v.title || 'درس');
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        renderVideo();
        incrementViews();
        loadComments();
        loadRelated();
    }).catch(function() { showError(); });
}

function renderVideo() {
    var container = document.getElementById('playerContainer');
    if (video.source_type === SOURCE_TYPES.TELEGRAM && video.file_id) {
        container.innerHTML = '<video id="player" playsinline controls style="width:100%;height:100%;"><source src="' + esc(video.url) + '" type="video/mp4"></video>';
        try { new Plyr('#player'); } catch(e) {}
    } else if (video.url) {
        var embedUrl = getYouTubeEmbedUrl(video.url, { autoplay: false });
        container.innerHTML = embedUrl
            ? '<iframe src="' + embedUrl + '" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>'
            : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);"><i class="fas fa-exclamation-triangle"></i> رابط غير صحيح</div>';
    } else {
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;">لا يوجد فيديو</div>';
    }

    document.getElementById('videoTitle').textContent = video.title || 'بدون عنوان';

    var meta = document.getElementById('metaBar');
    meta.innerHTML =
        (video.category ? '<span class="tag tag-green"><i class="fas fa-tag"></i> ' + esc(video.category) + '</span>' : '') +
        (video.grade ? '<span class="tag tag-purple"><i class="fas fa-graduation-cap"></i> ' + esc(video.grade) + '</span>' : '') +
        '<span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;"><i class="fas fa-eye"></i> ' + fmt(video.views||0) + ' مشاهدة</span>' +
        '<span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;"><i class="fas fa-star" style="color:var(--warning)"></i> ' + Number(video.avg_rating||0).toFixed(1) + ' (' + (video.rating_count||0) + ')</span>';

    var savedIds = JSON.parse(localStorage.getItem('saved_videos') || '[]');
    isSaved = savedIds.indexOf(parseInt(video.id)) > -1 || savedIds.indexOf(video.id) > -1;
    var likedKey = 'liked_' + video.id;
    isLiked = localStorage.getItem(likedKey) === '1';

    var actions = document.getElementById('actionBar');
    actions.innerHTML =
        '<button class="btn btn-secondary btn-sm like-btn' + (isLiked?' liked':'') + '" onclick="toggleLike()" id="likeBtn">' +
            '<i class="fas fa-thumbs-up"></i> <span id="likeCount">' + fmt(video.likes||0) + '</span>' +
        '</button>' +
        '<button class="btn btn-secondary btn-sm save-btn' + (isSaved?' saved':'') + '" onclick="toggleSave()" id="saveBtn">' +
            '<i class="fas fa-bookmark"></i> <span>' + (isSaved?'محفوظ':'حفظ') + '</span>' +
        '</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="shareVideo()"><i class="fas fa-share"></i> مشاركة</button>';

    var teacherRow = document.getElementById('teacherRow');
    teacherRow.href = '/pages/channel.html?id=' + esc(video.user_id);
    document.getElementById('teacherName').textContent = video.user_name || '';
    document.getElementById('teacherSubject').textContent = video.category ? 'مادة: ' + video.category : '';

    if (session) {
        document.getElementById('ratingSection').style.display = 'block';
        setupStars();
    }
}

function setupStars() {
    var stars = document.querySelectorAll('.star-input i');
    var labels = ['', 'ضعيف', 'مقبول', 'جيد', 'جيد جداً', 'ممتاز'];
    stars.forEach(function(star) {
        star.addEventListener('mouseover', function() {
            var val = parseInt(star.dataset.val);
            stars.forEach(function(s) { s.classList.toggle('hovered', parseInt(s.dataset.val) <= val); });
            document.getElementById('ratingLabel').textContent = labels[val] || '';
        });
        star.addEventListener('mouseout', function() {
            stars.forEach(function(s) { s.classList.remove('hovered'); });
            document.getElementById('ratingLabel').textContent = selectedRating ? labels[selectedRating] : '';
        });
        star.addEventListener('click', function() {
            selectedRating = parseInt(star.dataset.val);
            stars.forEach(function(s) { s.classList.toggle('filled', parseInt(s.dataset.val) <= selectedRating); });
            document.getElementById('ratingLabel').textContent = labels[selectedRating];
        });
    });
}

/* FIX: renamed from addComment to avoid conflict with the API function addComment() */
function submitComment() {
    if (!session) { showToast('يرجى تسجيل الدخول أولاً', 'error'); return; }
    var text = document.getElementById('commentInput').value.trim();
    if (!text && !selectedRating) { showToast('اكتب تعليقاً أو اختر تقييماً', 'error'); return; }

    addComment(video.id, session.user_id, session.name, text, selectedRating).then(function() {
        document.getElementById('commentInput').value = '';
        showToast('تم إضافة تعليقك', 'success');
        if (selectedRating) {
            var newCount = (video.rating_count||0) + 1;
            var newAvg = ((video.avg_rating||0) * (video.rating_count||0) + selectedRating) / newCount;
            updateVideoRating(video.id, newAvg, newCount).then(function() {
                video.avg_rating = newAvg;
                video.rating_count = newCount;
            });
            selectedRating = 0;
            document.querySelectorAll('.star-input i').forEach(function(s) { s.classList.remove('filled'); });
        }
        loadComments();
    }).catch(function(err) { showToast('فشل إضافة التعليق', 'error'); });
}

function loadComments() {
    getComments(video.id).then(function(comments) {
        var container = document.getElementById('commentsContainer');
        document.getElementById('commentCount').textContent = '(' + (comments ? comments.length : 0) + ')';
        if (!comments || !comments.length) {
            container.innerHTML = '<div class="empty-state" style="padding:24px;"><i class="fas fa-comment-slash"></i><p>لا توجد تعليقات</p></div>';
            return;
        }
        container.innerHTML = '';
        comments.forEach(function(c) {
            var stars = '';
            for (var i = 1; i <= 5; i++) stars += '<i class="fas fa-star" style="font-size:11px;color:' + (i<=(c.rating||0)?'var(--warning)':'var(--border)') + '"></i>';
            var div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML =
                '<div class="comment-header">' +
                    '<span class="comment-author">' + esc(c.user_name||'مجهول') + '</span>' +
                    '<span class="comment-date">' + fmtDate(c.created_at) + '</span>' +
                '</div>' +
                (c.rating ? '<div class="comment-rating">' + stars + '</div>' : '') +
                '<div class="comment-text">' + esc(c.text||'') + '</div>';
            container.appendChild(div);
        });
    });
}

function incrementViews() {
    var key = 'viewed_' + video.id;
    if (sessionStorage.getItem(key)) return;
    sessionStorage.setItem(key, '1');
    updateVideoViews(video.id, (video.views||0) + 1);
}

function toggleLike() {
    var key = 'liked_' + video.id;
    isLiked = !isLiked;
    var newLikes = (video.likes||0) + (isLiked ? 1 : -1);
    video.likes = Math.max(0, newLikes);
    localStorage.setItem(key, isLiked ? '1' : '0');
    updateVideoLikes(video.id, video.likes);
    var btn = document.getElementById('likeBtn');
    btn.className = 'btn btn-secondary btn-sm like-btn' + (isLiked?' liked':'');
    document.getElementById('likeCount').textContent = fmt(video.likes);
    showToast(isLiked ? 'أعجبك هذا الدرس' : 'تم إلغاء الإعجاب', 'success', 1500);
}

function toggleSave() {
    var savedIds = JSON.parse(localStorage.getItem('saved_videos') || '[]');
    var id = video.id;
    var idx = savedIds.indexOf(id);
    if (idx > -1) { savedIds.splice(idx, 1); isSaved = false; }
    else { savedIds.push(id); isSaved = true; }
    localStorage.setItem('saved_videos', JSON.stringify(savedIds));
    var btn = document.getElementById('saveBtn');
    btn.className = 'btn btn-secondary btn-sm save-btn' + (isSaved?' saved':'');
    btn.innerHTML = '<i class="fas fa-bookmark"></i> <span>' + (isSaved?'محفوظ':'حفظ') + '</span>';
    showToast(isSaved ? 'تم الحفظ' : 'تم الإلغاء', 'success', 1500);
}

function shareVideo() {
    var url = window.location.href;
    if (navigator.share) navigator.share({ title: video.title, url: url }).catch(function() {});
    else navigator.clipboard.writeText(url).then(function() { showToast('تم نسخ الرابط', 'success'); });
}

function loadRelated() {
    getVideos(video.category).then(function(videos) {
        var related = (videos || []).filter(function(v) { return v.id !== video.id; }).slice(0, 6);
        if (!related.length) return;
        document.getElementById('relatedSection').style.display = 'block';
        var container = document.getElementById('relatedVideos');
        related.forEach(function(v) {
            var div = document.createElement('div');
            div.className = 'related-item';
            var thumb = v.thumbnail
                ? '<img src="' + esc(v.thumbnail) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                  '<i class="fas fa-play" style="display:none;color:var(--text-muted)"></i>'
                : '<i class="fas fa-play" style="color:var(--text-muted)"></i>';
            div.innerHTML =
                '<div class="related-thumb">' + thumb + '</div>' +
                '<div class="related-info" style="flex:1;min-width:0;">' +
                    '<div class="title">' + esc(v.title||'بدون عنوان') + '</div>' +
                    '<div class="meta"><i class="fas fa-eye"></i> ' + fmt(v.views||0) + ' · ' + esc(v.user_name||'') + '</div>' +
                '</div>';
            div.onclick = function() { location.href = '/pages/watch.html?id=' + v.id; };
            container.appendChild(div);
        });
    });
}

function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
}
</script>
</body>
</html>
