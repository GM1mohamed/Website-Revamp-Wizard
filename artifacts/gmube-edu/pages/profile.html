<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMube Edu - حسابي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
<style>
.profile-header { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:14px; display:flex; align-items:center; gap:18px; }
.profile-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary)); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 0 20px var(--primary-glow); }
.profile-avatar i { font-size:36px; color:#fff; }
.profile-info h2 { font-size:20px; font-weight:800; margin-bottom:3px; }
.profile-info .role { font-size:12px; font-weight:700; color:var(--primary); margin-bottom:2px; }
.profile-info .detail { font-size:12px; color:var(--text-secondary); }
.stat-card .icon { background:var(--primary-glow); color:var(--primary); }
.saved-item { display:flex; align-items:center; gap:10px; padding:8px; border-radius:8px; cursor:pointer; transition:var(--transition); }
.saved-item:hover { background:var(--surface2); }
.saved-item .thumb { width:88px; height:50px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; }
.saved-item .thumb img { width:100%; height:100%; object-fit:cover; }
.saved-item .info { flex:1; min-width:0; }
.saved-item .title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.saved-item .meta { font-size:11px; color:var(--text-muted); }
.saved-item .del-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:6px; border-radius:6px; transition:var(--transition); flex-shrink:0; }
.saved-item .del-btn:hover { color:var(--danger); background:rgba(244,63,94,0.1); }
.comment-hist { padding:10px; border-radius:8px; margin-bottom:6px; background:var(--surface2); }
.comment-hist .hdr { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.comment-hist .txt { font-size:13px; margin-bottom:3px; }
.comment-hist .vlink { font-size:12px; color:var(--primary); cursor:pointer; }
.comment-hist .vlink:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="top-bar">
    <a href="/index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        <span>GMube Edu</span>
    </a>
    <div style="display:flex;gap:6px;margin-right:auto;">
        <a href="/index.html" class="btn btn-secondary btn-sm"><i class="fas fa-home"></i></a>
        <button onclick="logout()" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
</div>

<div class="page-container">

    <div class="profile-header" id="profileHeader">
        <div class="loading-state" style="padding:8px;"><div class="spinner"></div></div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="card" style="margin-bottom:12px;">
        <h3 style="font-size:14px;font-weight:800;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
            <i class="fas fa-bookmark" style="color:var(--primary);"></i> الدروس المحفوظة
        </h3>
        <div id="savedVideos"><div class="loading-state" style="padding:16px;"><div class="spinner" style="width:24px;height:24px;border-width:2px;"></div></div></div>
    </div>

    <div class="card" style="margin-bottom:12px;">
        <h3 style="font-size:14px;font-weight:800;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
            <i class="fas fa-comments" style="color:var(--primary);"></i> تعليقاتي
        </h3>
        <div id="myComments"><div class="loading-state" style="padding:16px;"><div class="spinner" style="width:24px;height:24px;border-width:2px;"></div></div></div>
    </div>

    <div class="card">
        <h3 style="font-size:14px;font-weight:800;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
            <i class="fas fa-lock" style="color:var(--primary);"></i> تغيير الرمز السري
        </h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px;">
            <div class="form-group" style="margin:0;"><label>الرمز الحالي</label><input type="password" id="currentSecret" placeholder="الرمز الحالي"></div>
            <div class="form-group" style="margin:0;"><label>الرمز الجديد</label><input type="password" id="newSecret" placeholder="الرمز الجديد"></div>
            <div class="form-group" style="margin:0;"><label>تأكيد الرمز</label><input type="password" id="confirmSecret" placeholder="تأكيد الرمز الجديد"></div>
        </div>
        <button class="btn btn-sm" onclick="changeSecret()"><i class="fas fa-save"></i> حفظ التغييرات</button>
        <div id="secretMsg" style="margin-top:8px;font-size:13px;"></div>
    </div>

</div>

<div class="bottom-nav">
    <a href="/index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="/pages/teachers.html" class="nav-item"><i class="fas fa-users"></i><span>الأساتذة</span></a>
    <a href="/pages/profile.html" class="nav-item active"><i class="fas fa-user"></i><span>حسابي</span></a>
</div>

<div id="toast" class="toast"></div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/error-handler.js"></script>
<script>
var session = getSession();
var userData = null;

if (!session) { location.href = '/login.html'; }

document.addEventListener('DOMContentLoaded', function() {
    loadUserData();
    loadSavedVideos();
    loadMyComments();
});

function loadUserData() {
    var table = session.type === 'teacher' ? 'teachers' : 'students';
    api(table + '?user_id=eq.' + session.user_id).then(function(data) {
        if (data && data.length) {
            userData = data[0];
            renderHeader();
            renderStats();
        }
    }).catch(function() {
        document.getElementById('profileHeader').innerHTML = '<div class="empty-state" style="padding:12px;"><i class="fas fa-exclamation-triangle"></i><p>فشل تحميل البيانات</p></div>';
    });
}

function renderHeader() {
    var roleText = session.type === 'teacher' ? 'معلم' : 'طالب';
    var roleIcon = session.type === 'teacher' ? 'fa-chalkboard-teacher' : 'fa-user-graduate';
    var detail = session.type === 'teacher' ? ('<i class="fas fa-book"></i> ' + esc(userData.subject||'')) : ('<i class="fas fa-graduation-cap"></i> ' + esc(userData.grade||''));
    document.getElementById('profileHeader').innerHTML =
        '<div class="profile-avatar"><i class="fas ' + roleIcon + '"></i></div>' +
        '<div class="profile-info">' +
            '<h2>' + esc(session.name) + '</h2>' +
            '<div class="role"><i class="fas fa-circle" style="font-size:5px;vertical-align:middle;margin-left:4px;"></i> ' + roleText + '</div>' +
            '<div class="detail">' + detail + '</div>' +
        '</div>';
}

function renderStats() {
    var savedIds = JSON.parse(localStorage.getItem('saved_videos') || '[]');
    api('comments?user_id=eq.' + session.user_id + '&select=id').then(function(comments) {
        var commentCount = comments ? comments.length : 0;
        var savedCount = savedIds.length;
        var statsHtml = '';
        if (session.type === 'teacher') {
            api('videos?user_id=eq.' + session.user_id + '&select=id,views').then(function(vids) {
                var totalViews = (vids||[]).reduce(function(s,v) { return s+(v.views||0); }, 0);
                document.getElementById('statsGrid').innerHTML =
                    stat('fa-video','var(--primary-glow)','var(--primary)',(vids||[]).length,'دروسي') +
                    stat('fa-eye','rgba(129,140,248,0.1)','var(--accent)',fmt(totalViews),'مشاهدات') +
                    stat('fa-comment','rgba(251,191,36,0.1)','var(--warning)',commentCount,'تعليقاتي') +
                    stat('fa-bookmark','rgba(16,185,129,0.1)','var(--success)',savedCount,'محفوظات');
            });
        } else {
            document.getElementById('statsGrid').innerHTML =
                stat('fa-bookmark','var(--primary-glow)','var(--primary)',savedCount,'محفوظات') +
                stat('fa-comment','rgba(129,140,248,0.1)','var(--accent)',commentCount,'تعليقاتي') +
                stat('fa-calendar','rgba(251,191,36,0.1)','var(--warning)',fmtDate(userData.created_at),'تاريخ التسجيل');
        }
    }).catch(function() {
        document.getElementById('statsGrid').innerHTML = '';
    });
}

function stat(icon, bg, color, value, label) {
    return '<div class="stat-card"><div class="icon" style="background:' + bg + ';color:' + color + ';"><i class="fas ' + icon + '"></i></div><div class="value">' + value + '</div><div class="label">' + label + '</div></div>';
}

function loadSavedVideos() {
    var container = document.getElementById('savedVideos');
    var savedIds = JSON.parse(localStorage.getItem('saved_videos') || '[]');
    if (!savedIds.length) { container.innerHTML = '<div class="empty-state" style="padding:24px;"><i class="fas fa-bookmark"></i><p>لا توجد دروس محفوظة</p><small>احفظ الدروس لتظهر هنا</small></div>'; return; }
    var filters = savedIds.map(function(id) { return 'id=eq.' + id; }).join(',');
    api('videos?or=(' + filters + ')').then(function(videos) {
        if (!videos || !videos.length) { container.innerHTML = '<div class="empty-state" style="padding:24px;"><i class="fas fa-bookmark"></i><p>لا توجد دروس محفوظة</p></div>'; return; }
        container.innerHTML = '';
        videos.forEach(function(v) {
            var item = document.createElement('div');
            item.className = 'saved-item';
            var thumb = v.thumbnail
                ? '<img src="' + esc(v.thumbnail) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                  '<i class="fas fa-play" style="display:none;color:var(--text-muted)"></i>'
                : '<i class="fas fa-play" style="color:var(--text-muted)"></i>';
            item.innerHTML =
                '<div class="thumb">' + thumb + '</div>' +
                '<div class="info"><div class="title">' + esc(v.title||'بدون عنوان') + '</div><div class="meta"><i class="fas fa-user-circle"></i> ' + esc(v.user_name||'') + ' · <i class="fas fa-eye"></i> ' + fmt(v.views||0) + '</div></div>' +
                '<button class="del-btn" onclick="event.stopPropagation();removeSaved(' + v.id + ',this)" title="إزالة"><i class="fas fa-times"></i></button>';
            item.onclick = function() { location.href = '/pages/watch.html?id=' + v.id; };
            container.appendChild(item);
        });
    }).catch(function() { container.innerHTML = '<div class="empty-state" style="padding:16px;"><i class="fas fa-exclamation-triangle"></i><p>فشل التحميل</p></div>'; });
}

function removeSaved(videoId, btn) {
    var savedIds = JSON.parse(localStorage.getItem('saved_videos') || '[]');
    savedIds = savedIds.filter(function(id) { return id != videoId; });
    localStorage.setItem('saved_videos', JSON.stringify(savedIds));
    loadSavedVideos();
    showToast('تم الإلغاء', 'success', 1500);
}

function loadMyComments() {
    var container = document.getElementById('myComments');
    api('comments?user_id=eq.' + session.user_id + '&order=created_at.desc&limit=10').then(function(comments) {
        if (!comments || !comments.length) { container.innerHTML = '<div class="empty-state" style="padding:24px;"><i class="fas fa-comment"></i><p>لا توجد تعليقات</p></div>'; return; }
        var videoIds = comments.map(function(c) { return c.video_id; }).filter(function(v,i,a) { return a.indexOf(v)===i; });
        api('videos?or=(' + videoIds.map(function(id) { return 'id=eq.'+id; }).join(',') + ')&select=id,title').then(function(vids) {
            var vmap = {};
            if (vids) vids.forEach(function(v) { vmap[v.id] = v.title; });
            container.innerHTML = '';
            comments.forEach(function(c) {
                var stars = '';
                for (var i=1;i<=5;i++) stars += '<i class="fas fa-star" style="font-size:10px;color:'+(i<=(c.rating||0)?'var(--warning)':'var(--border)')+'"></i>';
                var div = document.createElement('div');
                div.className = 'comment-hist';
                div.innerHTML =
                    '<div class="hdr"><span>' + (c.rating ? stars : '') + '</span><span>' + fmtDate(c.created_at) + '</span></div>' +
                    '<div class="txt">' + esc(c.text||'') + '</div>' +
                    '<div class="vlink" onclick="location.href=\'/pages/watch.html?id=' + c.video_id + '\'"><i class="fas fa-video"></i> ' + esc(vmap[c.video_id]||'الدرس') + '</div>';
                container.appendChild(div);
            });
        });
    }).catch(function() { container.innerHTML = '<div class="empty-state" style="padding:16px;"><i class="fas fa-exclamation-triangle"></i><p>فشل التحميل</p></div>'; });
}

function changeSecret() {
    var cur = document.getElementById('currentSecret').value.trim();
    var n = document.getElementById('newSecret').value.trim();
    var c = document.getElementById('confirmSecret').value.trim();
    var msg = document.getElementById('secretMsg');
    if (!cur||!n||!c) { msg.innerHTML = '<span style="color:var(--danger)">يرجى ملء جميع الحقول</span>'; return; }
    if (n !== c) { msg.innerHTML = '<span style="color:var(--danger)">الرموز غير متطابقة</span>'; return; }
    if (!userData || cur !== userData.secret) { msg.innerHTML = '<span style="color:var(--danger)">الرمز الحالي غير صحيح</span>'; return; }
    var table = session.type === 'teacher' ? 'teachers' : 'students';
    api(table + '?id=eq.' + userData.id, 'PATCH', { secret: n }).then(function() {
        userData.secret = n;
        msg.innerHTML = '<span style="color:var(--primary)"><i class="fas fa-check"></i> تم تغيير الرمز بنجاح</span>';
        document.getElementById('currentSecret').value = '';
        document.getElementById('newSecret').value = '';
        document.getElementById('confirmSecret').value = '';
    }).catch(function() { msg.innerHTML = '<span style="color:var(--danger)">فشل تغيير الرمز</span>'; });
}
</script>
</body>
</html>
